
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMO 상가 데이터 인사이트 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            padding: 1rem;
            overflow: hidden; /* 한 화면에 고정 */
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeInDown 0.8s ease-out;
            flex-shrink: 0;
        }

        .header-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .last-updated {
            font-size: 0.8rem;
            color: var(--text-dim);
            background: var(--card-bg);
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .kpi-card .label {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .kpi-card .value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .kpi-card .trend {
            margin-top: 0.2rem;
            font-size: 0.75rem;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Chart Grid */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3열 레이아웃으로 변경 */
            grid-template-rows: auto 1fr;
            gap: 1rem;
            flex: 1;
            min-height: 0; /* flex 자식의 overflow 허용을 위함 */
        }

        @media (max-width: 1200px) {
            .chart-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .chart-card {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chart-card h3 {
            margin-bottom: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .chart-card h3::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--primary);
            border-radius: 2px;
        }

        .chart-container {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        /* Table Section */
        .table-card {
            grid-column: span 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .table-wrapper {
            flex: 1;
            overflow-y: auto;
            margin-top: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            position: sticky;
            top: 0;
            background: #1e293b;
            text-align: left;
            color: var(--text-dim);
            font-size: 0.75rem;
            padding: 0.8rem;
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
        }

        td {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
        }

        .store-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .store-img {
            width: 32px;
            height: 32px;
            border-radius: 0.4rem;
            object-fit: cover;
            background: #334155;
        }

        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 0.4rem;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }

        .view-count {
            font-weight: 600;
            color: var(--accent);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

    </style>
</head>
